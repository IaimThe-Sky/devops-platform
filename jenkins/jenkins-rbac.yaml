apiVersion: v1
kind: ServiceAccount

metadata:
  name: jenkins-deployer
  namespace: jenkins

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding

metadata:
  name: jenkins-deployer-binding

subjects:
- kind: ServiceAccount
  name: jenkins-deployer
  namespace: jenkins

roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io